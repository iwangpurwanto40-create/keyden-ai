<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyden AI - Motion Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0d0d0d; color: #e5e7eb; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between pb-10">

    <div>
        <div class="text-center my-6">
            <h1 class="text-3xl font-black text-amber-400 tracking-wider">KEYDEN AI</h1>
            <p class="text-xs text-zinc-400 mt-1">motion control generator by Keyden</p>
            <div class="inline-block bg-zinc-900 border border-zinc-800 text-amber-400 text-xs px-3 py-1 rounded-full mt-3 font-semibold">
                ● Ready to Generate
            </div>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">API KEY (Magnific / Freepik)</label>
            <input type="password" id="apiKey" placeholder="sk-mag-..." class="w-full bg-zinc-950 p-3 text-sm rounded-xl border border-zinc-800 focus:outline-none focus:border-amber-400 text-amber-400">
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Reference Image <span class="text-zinc-500 font-normal">JPG, PNG, WebP · maks 15 MB</span></label>
            <div class="border-2 border-dashed border-zinc-800 rounded-xl p-6 text-center cursor-pointer hover:border-amber-400 transition-colors relative bg-zinc-950">
                <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <span class="text-amber-400 text-2xl block mb-1">↑</span>
                <p id="imageStatus" class="text-xs text-zinc-500">Klik atau drag gambar di sini</p>
            </div>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Reference Video <span class="text-zinc-500 font-normal">MP4, MOV, WebM · maks 100 MB</span></label>
            <div class="border-2 border-dashed border-zinc-800 rounded-xl p-6 text-center cursor-pointer hover:border-amber-400 transition-colors relative bg-zinc-950">
                <input type="file" id="videoInput" accept="video/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <span class="text-amber-400 text-2xl block mb-1">🎬</span>
                <p id="videoStatus" class="text-xs text-zinc-500">Klik atau drag video di sini</p>
            </div>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Model</label>
            <select id="modelSelect" class="w-full bg-zinc-950 p-3 text-sm rounded-xl border border-zinc-800 text-white focus:outline-none focus:border-amber-400">
                <option value="kling-v2.6">Kling 2.6 Standard</option>
                <option value="luma-dream-machine">Luma Dream Machine</option>
            </select>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Prompt <span class="text-zinc-500 font-normal">Opsional</span></label>
            <textarea id="promptInput" placeholder="contoh: The character walks forward slowly..." class="w-full bg-zinc-950 p-3 text-sm rounded-xl border border-zinc-800 h-24 resize-none focus:outline-none focus:border-amber-400 text-white"></textarea>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Character Orientation</label>
            <select id="orientationSelect" class="w-full bg-zinc-950 p-3 text-sm rounded-xl border border-zinc-800 text-white focus:outline-none focus:border-amber-400">
                <option value="video">Video (default)</option>
                <option value="image">Image</option>
            </select>
        </div>

        <div class="mb-6 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <div class="flex justify-between text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">
                <span>CFG Scale</span>
                <span id="cfgValue" class="text-amber-400">0.50</span>
            </div>
            <input type="range" id="cfgScale" min="0" max="1" step="0.05" value="0.50" class="w-full accent-amber-400 bg-zinc-950 h-2 rounded-lg appearance-none cursor-pointer">
        </div>
    </div>

    <div>
        <button id="generateBtn" class="w-full bg-amber-400 text-black font-black py-4 rounded-2xl hover:bg-amber-300 transition-all shadow-lg shadow-amber-500/10 cursor-pointer text-center uppercase tracking-wider text-sm">
            Generate Video
        </button>

        <div id="resultContainer" class="mt-6 p-4 bg-zinc-900 border border-zinc-800 rounded-2xl hidden">
            <h3 class="text-xs font-bold text-zinc-400 mb-3 uppercase tracking-wider">Status Pemrosesan:</h3>
            <div id="loadingStatus" class="text-sm text-amber-400 mb-2 font-semibold animate-pulse">Menghubungkan ke server AI...</div>
            <video id="outputVideo" controls class="w-full rounded-xl border border-zinc-950 bg-black mt-3 hidden"></video>
            <a id="downloadBtn" href="#" target="_blank" class="text-center mt-3 text-xs bg-amber-400 text-black font-bold p-3 rounded-xl hover:bg-amber-300 block hidden">Unduh Video</a>
        </div>
    </div>

    <script>
        let uploadedImageUrl = "";
        let uploadedVideoUrl = "";

        async function uploadFileToInternet(file) {
            const formData = new FormData();
            formData.append("file", file);
            const res = await fetch("https://tmpfiles.org/api/v1/upload", { method: "POST", body: formData });
            if (!res.ok) throw new Error("Gagal mengunggah file.");
            const data = await res.json();
            return data.data.url.replace("tmpfiles.org/", "tmpfiles.org/dl/");
        }

        const imageInput = document.getElementById('imageInput');
        const imageStatus = document.getElementById('imageStatus');
        imageInput.addEventListener('change', async () => {
            if(imageInput.files.length > 0) {
                imageStatus.innerText = "Mengunggah gambar...";
                try {
                    uploadedImageUrl = await uploadFileToInternet(imageInput.files[0]);
                    imageStatus.innerText = "Gambar Berhasil Diunggah ✔";
                    imageStatus.className = "text-xs text-amber-400 font-semibold";
                } catch(e) {
                    alert("Gagal unggah gambar: " + e.message);
                    imageStatus.innerText = "Klik untuk coba lagi";
                }
            }
        });

        const videoInput = document.getElementById('videoInput');
        const videoStatus = document.getElementById('videoStatus');
        videoInput.addEventListener('change', async () => {
            if(videoInput.files.length > 0) {
                videoStatus.innerText = "Mengunggah video...";
                try {
                    uploadedVideoUrl = await uploadFileToInternet(videoInput.files[0]);
                    videoStatus.innerText = "Video Berhasil Diunggah ✔";
                    videoStatus.className = "text-xs text-amber-400 font-semibold";
                } catch(e) {
                    alert("Gagal unggah video: " + e.message);
                    videoStatus.innerText = "Klik untuk coba lagi";
                }
            }
        });

        const cfgScale = document.getElementById('cfgScale');
        const cfgValue = document.getElementById('cfgValue');
        cfgScale.addEventListener('input', () => { cfgValue.innerText = parseFloat(cfgScale.value).toFixed(2); });

        document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('promptInput').value;
            const model = document.getElementById('modelSelect').value;
            const cfg = document.getElementById('cfgScale').value;
            const orientation = document.getElementById('orientationSelect').value;

            if (!apiKey) return alert("Mohon masukkan API Key!");
            if (!uploadedImageUrl) return alert("Mohon tunggu Gambar Referensi selesai diunggah!");

            const btn = document.getElementById('generateBtn');
            btn.innerText = "MENGIRIM PERMINTAAN...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            document.getElementById('resultContainer').classList.remove('hidden');
            const loadStatus = document.getElementById('loadingStatus');
            loadStatus.classList.remove('hidden');
            loadStatus.innerText = "Mengirim data antrean ke backend Vercel...";

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        apiKey, model, prompt,
                        image_url: uploadedImageUrl,
                        video_url: uploadedVideoUrl || undefined,
                        guidance_scale: cfg,
                        character_orientation: orientation
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Gagal memproses ke server AI.");

                loadStatus.innerText = "Permintaan diterima! Sedang mengantre di server Magnific...";
                checkVideoStatus(data.task_id || data.id, apiKey);

            } catch (error) {
                alert("Eror: " + error.message);
                resetButton();
                loadStatus.classList.add('hidden');
            }
        });

        async function checkVideoStatus(taskId, apiKey) {
            const btn = document.getElementById('generateBtn');
            const loadStatus = document.getElementById('loadingStatus');
            
            const timer = setInterval(async () => {
                try {
                    const res = await fetch('/api/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ apiKey, taskId, checkStatus: true })
                    });
                    const resData = await res.json();

                    if (resData.status === 'completed' || resData.status === 'COMPLETED') {
                        clearInterval(timer);
                        const finalVideoUrl = resData.output_video_url || resData.result;
                        
                        loadStatus.innerText = "Selesai! Video berhasil dibuat.";
                        
                        const vWidget = document.getElementById('outputVideo');
                        vWidget.src = finalVideoUrl;
                        vWidget.classList.remove('hidden');
                        
                        const dlWidget = document.getElementById('downloadBtn');
                        dlWidget.href = finalVideoUrl;
                        dlWidget.classList.remove('hidden');
                        
                        resetButton();
                    } else if (resData.status === 'failed' || resData.status === 'FAILED') {
                        clearInterval(timer);
                        alert("Pembuatan video gagal di server AI.");
                        resetButton();
                        loadStatus.innerText = "Proses gagal.";
                    } else {
                        const progress = resData.progress !== undefined ? resData.progress : 'Antre';
                        btn.innerText = `PROSES GENERATE... (${progress}%)`;
                        loadStatus.innerText = `Sedang diproses oleh AI Magnific... Progress: ${progress}%`;
                    }
                } catch(e) {
                    console.log("Menghubungkan...");
                }
            }, 6000);
        }

        function resetButton() {
            const btn = document.getElementById('generateBtn');
            btn.innerText = "Generate Video";
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    </script>
</body>
</html>
