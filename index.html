<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyden AI - Motion Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0d0d0d; color: #e5e7eb; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between pb-10">

    <div>
        <div class="text-center my-6">
            <h1 class="text-3xl font-black text-amber-400 tracking-wider">KEYDEN AI</h1>
            <p class="text-xs text-zinc-400 mt-1">motion control generator by Keyden</p>
            <div class="inline-block bg-zinc-900 border border-zinc-800 text-amber-400 text-xs px-3 py-1 rounded-full mt-3 font-semibold">
                ● Ready to Generate
            </div>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">API KEY (Freepik / Magnific)</label>
            <input type="password" id="apiKey" placeholder="sk-mag-..." class="w-full bg-zinc-950 p-3 text-sm rounded-xl border border-zinc-800 focus:outline-none focus:border-amber-400 text-amber-400">
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Reference Image</label>
            <div class="border-2 border-dashed border-zinc-800 rounded-xl p-6 text-center cursor-pointer hover:border-amber-400 transition-colors relative bg-zinc-950">
                <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <span class="text-amber-400 text-2xl block mb-1">↑</span>
                <p id="imageStatus" class="text-xs text-zinc-500">Klik atau drag gambar di sini (Maks 15MB)</p>
            </div>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Reference Video</label>
            <div class="border-2 border-dashed border-zinc-800 rounded-xl p-6 text-center cursor-pointer hover:border-amber-400 transition-colors relative bg-zinc-950">
                <input type="file" id="videoInput" accept="video/*" class="absolute inset-0 opacity-0 cursor-pointer">
                <span class="text-amber-400 text-2xl block mb-1">🎬</span>
                <p id="videoStatus" class="text-xs text-zinc-500">Klik atau drag video di sini (Maks 100MB)</p>
            </div>
            <p class="text-[10px] text-amber-400/70 mt-2">Gunakan video referensi dari TikTok agar ukurannya kecil</p>
        </div>

        <div class="mb-4 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Model AI</label>
            <select id="modelSelect" class="w-full bg-zinc-950 p-3 text-sm rounded-xl border border-zinc-800 mb-4 text-white focus:outline-none focus:border-amber-400">
                <option value="kling-2.6">Kling 2.6 Standard</option>
                <option value="luma-dream-machine">Luma Dream Machine</option>
            </select>

            <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">Prompt (Opsional)</label>
            <textarea id="promptInput" placeholder="Contoh: The character walks forward slowly..." class="w-full bg-zinc-950 p-3 text-sm rounded-xl border border-zinc-800 h-24 resize-none focus:outline-none focus:border-amber-400 text-white"></textarea>
        </div>

        <div class="mb-6 bg-zinc-900 p-4 rounded-2xl border border-zinc-800/80">
            <div class="flex justify-between text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider">
                <span>CFG Scale</span>
                <span id="cfgValue" class="text-amber-400">0.50</span>
            </div>
            <input type="range" id="cfgScale" min="0" max="1" step="0.05" value="0.50" class="w-full accent-amber-400 bg-zinc-950 h-2 rounded-lg appearance-none cursor-pointer">
            <div class="flex justify-between text-[10px] text-zinc-500 mt-1">
                <span>0 = Bebas</span>
                <span>1 = Ketat</span>
            </div>
        </div>
    </div>

    <div>
        <button id="generateBtn" class="w-full bg-amber-400 text-black font-black py-4 rounded-2xl hover:bg-amber-300 transition-all shadow-lg shadow-amber-500/10 cursor-pointer text-center uppercase tracking-wider text-sm">
            Generate Video
        </button>

        <div id="resultContainer" class="mt-6 p-4 bg-zinc-900 border border-zinc-800 rounded-2xl hidden">
            <h3 class="text-xs font-bold text-zinc-400 mb-3 uppercase tracking-wider">Hasil Video Anda:</h3>
            <video id="outputVideo" controls class="w-full rounded-xl border border-zinc-950 bg-black"></video>
            <a id="downloadBtn" href="#" download="ai-video.mp4" class="block text-center mt-3 text-xs bg-zinc-800 text-white p-2 rounded-lg hover:bg-zinc-700">Unduh Video</a>
        </div>
    </div>

    <script>
        // Status upload gambar
        const imageInput = document.getElementById('imageInput');
        const imageStatus = document.getElementById('imageStatus');
        imageInput.addEventListener('change', () => {
            if(imageInput.files.length > 0) {
                imageStatus.innerText = "Gambar terpilih: " + imageInput.files[0].name;
                imageStatus.className = "text-xs text-amber-400 font-semibold";
            }
        });

        // Status upload video
        const videoInput = document.getElementById('videoInput');
        const videoStatus = document.getElementById('videoStatus');
        videoInput.addEventListener('change', () => {
            if(videoInput.files.length > 0) {
                videoStatus.innerText = "Video terpilih: " + videoInput.files[0].name;
                videoStatus.className = "text-xs text-amber-400 font-semibold";
            }
        });

        // Slider CFG Scale
        const cfgScale = document.getElementById('cfgScale');
        const cfgValue = document.getElementById('cfgValue');
        cfgScale.addEventListener('input', () => {
            cfgValue.innerText = parseFloat(cfgScale.value).toFixed(2);
        });

        // Logika Klik Generate
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const prompt = document.getElementById('promptInput').value;
            const model = document.getElementById('modelSelect').value;
            const cfg = document.getElementById('cfgScale').value;

            if (!apiKey) {
                alert("Mohon masukkan API Key Freepik/Magnific Anda terlebih dahulu!");
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.innerText = "MENGIRIM PERMINTAAN...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('https://api.freepik.com/v1/ai/video-generation', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        prompt: prompt || "Smooth cinematic motion control effect",
                        guidance_scale: parseFloat(cfg)
                    })
                });

                if (!response.ok) {
                    throw new Error("Gagal terhubung ke API. Cek API Key Anda.");
                }

                const data = await response.json();
                const taskId = data.task_id;

                btn.innerText = "PROSES GENERATE VIDEO...";
                checkStatus(taskId, apiKey);

            } catch (error) {
                alert("Error: " + error.message);
                resetButton();
            }
        });

        async function checkStatus(taskId, apiKey) {
            const btn = document.getElementById('generateBtn');
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`https://api.freepik.com/v1/ai/tasks/${taskId}`, {
                        headers: { 'Authorization': `Bearer ${apiKey}` }
                    });
                    const taskData = await res.json();

                    if (taskData.status === 'COMPLETED') {
                        clearInterval(interval);
                        document.getElementById('outputVideo').src = taskData.output_video_url;
                        document.getElementById('downloadBtn').href = taskData.output_video_url;
                        document.getElementById('resultContainer').classList.remove('hidden');
                        resetButton();
                    } else if (taskData.status === 'FAILED') {
                        clearInterval(interval);
                        alert("Pembuatan video gagal diproses.");
                        resetButton();
                    } else {
                        btn.innerText = `SEDANG MEMPROSES... (${taskData.progress || 'Antre'}%)`;
                    }
                } catch (err) {
                    console.error(err);
                }
            }, 5000);
        }

        function resetButton() {
            const btn = document.getElementById('generateBtn');
            btn.innerText = "Generate Video";
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    </script>
</body>
</html>
